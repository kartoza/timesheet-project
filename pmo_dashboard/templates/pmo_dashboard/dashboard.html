<!DOCTYPE html>
<html lang="en">
<head>
    {% load render_bundle from webpack_loader %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMO Dashboard</title>
    <link rel="icon" href="/static/default-favicon.ico">
</head>
<body>
    <script>
        window.isLoggedIn = {% if user.is_authenticated %}true{% else %}false{% endif %};
        window.canAccessPMO = {% if can_access_pmo %}true{% else %}false{% endif %};
    </script>
    <div id="root"></div>
    {% render_bundle 'PMODashboard' %}
</body>
</html>
